name: Deploy to HF Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        timeout-minutes: 30
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GIT_HTTP_TIMEOUT: "1800"
        run: |
          git config user.email "ci@axis"
          git config user.name "AXIS CI"
          git push https://gokul1622:$HF_TOKEN@huggingface.co/spaces/gokul1622/axis-backend main --force
